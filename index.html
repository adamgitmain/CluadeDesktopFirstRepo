<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&family=Inter:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #090c15;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .card {
      width: 700px;
      max-width: 95vw;
      border-radius: 12px;
      overflow: hidden;
      background: #0f1424;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.7);
    }

    .date-banner {
      background: linear-gradient(105deg, #b87a00 0%, #f0c020 45%, #f5d040 70%, #e8b800 100%);
      padding: 22px 32px 20px;
      text-align: center;
    }

    .date-banner h1 {
      font-family: 'Barlow Condensed', Arial Narrow, sans-serif;
      font-weight: 800;
      font-size: 2.7rem;
      letter-spacing: 0.03em;
      color: #1a1000;
      text-transform: uppercase;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
    }

    .task-list {
      padding: 8px 0 16px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px 32px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      transition: background 0.15s ease;
    }

    .task-item:last-child {
      border-bottom: none;
    }

    .task-item:hover {
      background: rgba(255, 255, 255, 0.035);
    }

    .task-num {
      font-size: 0.72rem;
      font-weight: 500;
      color: #4e6080;
      letter-spacing: 0.06em;
      min-width: 20px;
      user-select: none;
    }

    .task-text {
      font-size: 1.05rem;
      font-weight: 700;
      color: #eef2ff;
      letter-spacing: 0.01em;
    }

    .task-text.placeholder {
      color: #3a4a62;
      font-weight: 500;
      font-style: italic;
    }

    /* ── Quick links ── */
    .quick-links {
      display: flex;
      gap: 12px;
      padding: 16px 32px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .quick-link {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      text-decoration: none;
      color: #8a9bbf;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .quick-link:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #eef2ff;
    }

    .quick-link svg {
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="date-banner">
    <h1 id="dateDisplay">LOADING…</h1>
  </div>

  <div class="task-list">
    <div class="task-item">
      <span class="task-num">01</span>
      <span class="task-text placeholder">Task one placeholder</span>
    </div>
    <div class="task-item">
      <span class="task-num">02</span>
      <span class="task-text placeholder">Task two placeholder</span>
    </div>
    <div class="task-item">
      <span class="task-num">03</span>
      <span class="task-text placeholder">Task three placeholder</span>
    </div>
  </div>
  <div class="quick-links">
    <a class="quick-link" href="https://mail.google.com" target="_blank">
      <!-- Gmail icon -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 6a2 2 0 012-2h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" fill="#1a2540"/>
        <path d="M2 6l10 7 10-7" stroke="#8a9bbf" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M2 6l10 7" stroke="#EA4335" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M12 13l10-7" stroke="#4285F4" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      Gmail
    </a>
    <a class="quick-link" href="https://drive.google.com" target="_blank">
      <!-- Google Drive icon -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3L2 20h7l3-5.2L15 20h7L12 3z" fill="#1a2540"/>
        <path d="M8.5 15L4 20h16l-4.5-5H8.5z" fill="#4285F4" opacity="0.7"/>
        <path d="M12 3L7 12h10L12 3z" fill="#34A853" opacity="0.8"/>
        <path d="M7 12L2 20h7l5-8H7z" fill="#FBBC05" opacity="0.8"/>
        <path d="M12 3l5 9h5L12 3z" fill="#EA4335" opacity="0.8"/>
      </svg>
      Google Drive
    </a>
  </div>
</div>

<script>
  const days   = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

  const now = new Date();
  const dayName   = days[now.getDay()];
  const monthName = months[now.getMonth()];
  const date      = now.getDate();
  const year      = now.getFullYear();

  const h1 = document.getElementById('dateDisplay');
  h1.textContent = `${dayName}, ${monthName} ${date}, ${year}`;

  // Auto-shrink font if text overflows the banner
  const banner = document.querySelector('.date-banner');
  let size = 2.7;
  while (h1.scrollWidth > banner.clientWidth - 64 && size > 1) {
    size -= 0.05;
    h1.style.fontSize = size + 'rem';
  }
</script>

</body>
</html>
